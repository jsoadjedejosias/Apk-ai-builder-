name: EAS Build
on:
  workflow_dispatch:
    inputs:
      build_id:  { required: true }
      app_name:  { required: true }
      site_url:  { required: true }
      format:    { required: true }  # "APK" ou "AAB"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install -g eas-cli
      - run: npm install
      - name: Patch app.json
        run: |
          node -e "
            const fs=require('fs');
            const a=JSON.parse(fs.readFileSync('app.json'));
            a.expo.name='${{ inputs.app_name }}';
            a.expo.extra={SITE_URL:'${{ inputs.site_url }}'};
            fs.writeFileSync('app.json', JSON.stringify(a,null,2));
          "
      - name: Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE=$([ "${{ inputs.format }}" = "AAB" ] && echo "aab" || echo "apk")
          eas build --platform android --profile $PROFILE --non-interactive --no-wait w  
